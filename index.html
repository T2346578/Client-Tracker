<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prime Shine - Receipt</title>
    <meta name="color-scheme" content="light dark" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div class="min-h-dvh">
      <div class="mx-auto max-w-6xl px-4 py-6">
        <header class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <h1 class="text-2xl font-semibold tracking-tight">Receipt</h1>
            <p class="text-sm text-slate-300">
              Tracks clients, jobs, invoices, and totals. Print invoices to PDF.
            </p>
          </div>
          <div class="flex flex-wrap gap-2">
            <button id="exportBtn" class="btn btn-secondary">Export</button>
            <label class="btn btn-secondary cursor-pointer">
              Import
              <input id="importFile" type="file" accept="application/json" class="hidden" />
            </label>
            <button id="printBtn" class="btn btn-secondary hidden">Print invoice</button>
          </div>
        </header>

        <div class="mt-6 grid gap-4 lg:grid-cols-[240px_1fr]">
          <nav class="card p-3">
            <div class="px-2 pb-2 text-xs font-medium uppercase tracking-wide text-slate-400">
              Menu
            </div>
            <div class="flex flex-col gap-1">
              <a class="navlink" href="#/dashboard" data-route="dashboard">Dashboard</a>
              <a class="navlink" href="#/clients" data-route="clients">Clients</a>
              <a class="navlink" href="#/invoices" data-route="invoices">Invoices</a>
              <a class="navlink" href="#/receipts" data-route="receipts">Receipts</a>
              <a class="navlink" href="#/settings" data-route="settings">Settings</a>
            </div>
            <div class="mt-3 border-t border-white/10 pt-3">
              <div class="px-2 text-xs text-slate-400">
                Data is saved on this device.
              </div>
            </div>
          </nav>

          <main class="min-w-0">
            <section id="view-dashboard" class="view"></section>
            <section id="view-clients" class="view hidden"></section>
            <section id="view-invoices" class="view hidden"></section>
            <section id="view-receipts" class="view hidden"></section>
            <section id="view-settings" class="view hidden"></section>
            <section id="view-invoice-print" class="view hidden"></section>
          </main>
        </div>
      </div>
    </div>

    <div
      id="toast"
      class="pointer-events-none fixed bottom-5 left-1/2 z-50 hidden -translate-x-1/2 rounded-xl border border-white/10 bg-slate-900/90 px-4 py-3 text-sm shadow-xl backdrop-blur"
    ></div>

    <script defer src="./app.js"></script>
  </body>
</html>
